<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== SEO: Title & Description ===== -->
    <title>Bright Star MEP | Expert HVAC, Fire Fighting, Electrical & Plumbing Services in Delhi NCR</title>
    <meta name="description" content="Bright Star MEP delivers trusted HVAC, fire fighting, electrical, and plumbing solutions for commercial & industrial projects in New Delhi, Noida, and Gurugram. Request a free consultation today." />
    <meta name="keywords" content="MEP contractor Delhi, HVAC contractor Noida, fire fighting system Gurugram, electrical contractor Delhi NCR, plumbing contractor, Bright Star MEP" />

    <!-- ===== Canonical URL ===== -->
    <link rel="canonical" href="https://brightstar-mep.netlify.app/" />

    <!-- ===== Open Graph / Social Sharing ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brightstar-mep.netlify.app/" />
    <meta property="og:title" content="Bright Star MEP | HVAC, Fire Fighting, Electrical & Plumbing" />
    <meta property="og:description" content="Expert MEP engineering solutions for commercial & industrial projects across Delhi NCR. HVAC, fire fighting, electrical, and plumbing specialists." />
    <meta property="og:site_name" content="Bright Star MEP" />

    <!-- ===== Local Business JSON-LD Schema ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Bright Star MEP",
      "url": "https://brightstar-mep.netlify.app/",
      "description": "Bright Star MEP provides expert HVAC, fire fighting, electrical, and plumbing (MEP) engineering services for commercial and industrial clients across Delhi NCR.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "YOUR_STREET_ADDRESS_HERE",
        "addressLocality": "New Delhi",
        "addressRegion": "Delhi",
        "postalCode": "YOUR_POSTAL_CODE_HERE",
        "addressCountry": "IN"
      },
      "telephone": "YOUR_PHONE_NUMBER_HERE",
      "areaServed": ["New Delhi", "Noida", "Gurugram", "Delhi NCR"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "MEP Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "HVAC Installation & Maintenance" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Fire Fighting Systems" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Electrical Works" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Plumbing Services" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <!-- Hidden form for Netlify detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
